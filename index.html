<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitamura Animal Hospital</title>
    <meta name="description" content="滑石きたむら動物病院のホームページです。">
    <meta name="keywords" content="ホームドクター, 動物病院">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&display=swap">
    <link rel="stylesheet" href="https://use.typekit.net/mzd4mgq.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    
</head>
<body>
    <div id="container">
        <header class="header">
            <div class="inner">
                <h1 class="header__logo">
                    <a href="#">
                        <img src="./img/logo.svg" alt="滑石きたむら動物病院ロゴ">
                        <span class="header__title">滑石きたむら動物病院</span>
                    </a>
                </h1>
                <nav class="header__nav pc">
                    <ul>
                        <li>
                            <a href="#ご挨拶">ご挨拶</a>
                        </li>
                        <li>
                            <a href="#強み">強み</a>
                        </li>
                        <li>
                            <a href="#サービス">サービス</a>
                        </li>
                        <li>
                            <a href="#お知らせ">お知らせ</a>
                        </li>
                        <li>
                            <a href="#アクセス">アクセス</a>
                        </li>
                        <li>
                            <a href="#お問い合わせ">お問い合わせ</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>
        <main class="main">
            <div class="mv">
                <div class="mv__image">
                    <picture>
                        <source media="(min-width: 768px)" srcset="./img/FV-pc.jpg">
                        <img src="./img/FV-sp.jpg" alt="滑石きたむら動物病院は大切な家族のホームドクターです">
                    </picture>
                </div>

                <div class="inner">
                    <div class="mv__contents">
                        <p class="mv__catch">
                            <span class="mv__catch-sub">滑石きたむら動物病院は</span>
                            <span class="mv__catch-main">大切な家族の<br>ホームドクターです</span>
                        </p>
                    </div>
                </div>
            </div>
            <div class="about">
                <div class="inner">
                    <div class="about__contents">
                    <div class="about__title">動物たちの健康で<br class="sp">幸せな生活をサポート</div>
                    <div class="about__text">当院は地域に密着し、皆さまの大切な家族の一員である動物たちのホームドクターを目指しています。<br>緊急時だけではなく、日常のちょっとした不安や違和感などお気軽にご相談ください。<br>動物たちが健康で幸せな生活を送ることができるようサポートいたします。</div>
                    </div>
                </div>
            </div>
        </main>
        <footer class="footer">

        </footer>
    </div>
</body>
</html>
